# ── Provider health check ──────────────────────────────────────────────────
# Hits the live Vercel deployment to verify every provider's API proxy
# still returns valid data. Runs on a schedule and can be triggered manually.
#
# Checks per provider:
#   kilolabs  — GET /api/inbox/:email         → 200, JSON array
#   hd        — GET /api/providers/hd?action=inbox&email=...  → 200, JSON array
#   edu       — GET /api/providers/edu?action=inbox&email=... → 200, JSON array
#
# Secrets required (Repo → Settings → Secrets → Actions):
#   KILOMAIL_BASE_URL   — e.g. https://kilomail.vercel.app  (no trailing slash)

name: Provider health check

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # manual trigger with optional inputs
    inputs:
      provider:
        description: "Which provider to test (kilolabs | hd | edu | all)"
        required: false
        default: "all"
      verbose:
        description: "Print full response body"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false  # health checks should never cancel each other

permissions:
  contents: read

jobs:
  health:
    name: Check providers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"

      # ── Run the health check script ──────────────────────────────────
      - name: Run health checks
        env:
          BASE_URL: ${{ secrets.KILOMAIL_BASE_URL }}
          TARGET_PROVIDER: ${{ github.event.inputs.provider || 'all' }}
          VERBOSE: ${{ github.event.inputs.verbose || 'false' }}
        run: node .github/scripts/health-check.mjs
