# ── CI — type-check · lint · build ───────────────────────────────────────
#
# Jobs
#   check   — tsc (src/ + api/) + ESLint
#   build   — Vite production build
#   health  — provider API smoke tests (schedule + manual only)
#
# No push triggers. No deploy.
# Secrets (optional, only used by the health job):
#   KILOMAIL_BASE_URL  e.g. https://kilomail.vercel.app

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 */6 * * *"   # health check every 6 hours
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to health-check (kilolabs | hd | edu | all)"
        required: false
        default: "all"
      verbose:
        description: "Print full response bodies"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ── Shared setup ─────────────────────────────────────────────────────────────

jobs:
  # ── 1. Type-check + lint ───────────────────────────────────────────────────
  check:
    name: Type-check · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # src/ — uses tsconfig.app.json (strict, noEmit)
      - name: Type-check src/
        run: npx tsc --build --noEmit

      # api/ — Vercel compiles these independently so tsc --build misses them.
      # We generate a throwaway tsconfig inline, run it, then delete it.
      - name: Type-check api/
        run: |
          cat > tsconfig.api.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2023",
              "lib": ["ES2023"],
              "module": "ESNext",
              "moduleResolution": "bundler",
              "allowImportingTsExtensions": true,
              "verbatimModuleSyntax": true,
              "moduleDetection": "force",
              "noEmit": true,
              "strict": true,
              "noUnusedLocals": true,
              "noUnusedParameters": true,
              "skipLibCheck": true,
              "baseUrl": ".",
              "paths": { "@/*": ["./src/*"] }
            },
            "include": ["api/**/*.ts"]
          }
          EOF
          npx tsc --project tsconfig.api.json
          rm -f tsconfig.api.json

      - name: ESLint
        run: npm run lint

  # ── 2. Production build ────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Runs the same command Vercel runs: tsc -b && vite build
      # VITE_APP_ENV just needs to exist — no real value required in CI.
      - name: Vite production build
        run: npm run build
        env:
          VITE_APP_ENV: ci

  # ── 3. Provider health check ───────────────────────────────────────────────
  health:
    name: Provider health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only runs on schedule or manual dispatch — not on PRs.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    # Health checks should never cancel each other on schedule runs.
    concurrency:
      group: health
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          # No npm ci needed — health-check.mjs uses only Node built-ins.

      - name: Run provider health checks
        env:
          BASE_URL: ${{ secrets.KILOMAIL_BASE_URL }}
          TARGET_PROVIDER: ${{ github.event.inputs.provider || 'all' }}
          VERBOSE: ${{ github.event.inputs.verbose || 'false' }}
        run: node .github/scripts/health-check.mjs

