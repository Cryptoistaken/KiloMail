# ── Type-check API edge functions ─────────────────────────────────────────
# The api/ folder uses tsconfig.node.json (which only covers vite.config.ts).
# Vercel compiles api/*.ts independently with its own bundler, so tsc --build
# in CI won't catch type errors in api/ files by default.
#
# This workflow runs a dedicated tsc pass over api/ so broken API types
# surface in CI before they hit Vercel's build.
#
# No secrets required.

name: API type-check

on:
  push:
    paths:
      - "api/**"             # only runs when api/ files change
      - "src/lib/types.ts"   # or the shared types they import
      - ".github/workflows/api-typecheck.yml"
  pull_request:
    paths:
      - "api/**"
      - "src/lib/types.ts"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-api:
    name: Type-check api/
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Write a temporary tsconfig that covers api/ only.
      # Uses the same strict settings as tsconfig.node.json but includes api/.
      # The file is created inline — no need to commit it to the repo.
      - name: Write api tsconfig
        run: |
          cat > tsconfig.api.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2023",
              "lib": ["ES2023"],
              "module": "ESNext",
              "moduleResolution": "bundler",
              "allowImportingTsExtensions": true,
              "verbatimModuleSyntax": true,
              "moduleDetection": "force",
              "noEmit": true,
              "strict": true,
              "noUnusedLocals": true,
              "noUnusedParameters": true,
              "skipLibCheck": true,
              "baseUrl": ".",
              "paths": { "@/*": ["./src/*"] }
            },
            "include": ["api/**/*.ts"]
          }
          EOF

      - name: Type-check api/
        run: npx tsc --project tsconfig.api.json

      - name: Cleanup temp tsconfig
        if: always()
        run: rm -f tsconfig.api.json
